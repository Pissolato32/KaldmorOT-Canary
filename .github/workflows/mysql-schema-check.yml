---
name: MySQL Schema Check

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "schema.sql"
  merge_group:
  push:
    paths:
      - "schema.sql"
    branches:
      - main

jobs:
  mysql-schema-check:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: canary
          MYSQL_USER: canary
          MYSQL_PASSWORD: canary
        ports:
          - 3306/tcp
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    strategy:
      fail-fast: false
    name: Check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for MySQL to be ready
        run: |
          # Wait for the service to be ready
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P ${{ job.services.mysql.ports['3306'] }} -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Import Canary Schema
        run: |
          mysql -h 127.0.0.1 -P ${{ job.services.mysql.ports['3306'] }} -uroot -proot canary < schema.sql -v
